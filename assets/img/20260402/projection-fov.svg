<svg width="720" height="360" viewBox="0 0 720 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="360" rx="24" fill="#FAF7F2"/>
  <rect x="28" y="28" width="664" height="304" rx="20" fill="#FFFDFC" stroke="#E7DED2" stroke-width="2"/>

  <text x="56" y="74" fill="#3F3A36" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600">FOV Sets The Opening Angle</text>

  <circle cx="138" cy="182" r="7" fill="#3F3A36"/>
  <text x="74" y="214" fill="#3F3A36" font-family="Segoe UI, Arial, sans-serif" font-size="21">camera</text>

  <line x1="138" y1="182" x2="598" y2="182" stroke="#8A8178" stroke-width="2.5"/>
  <text x="604" y="188" fill="#5C5550" font-family="Segoe UI, Arial, sans-serif" font-size="18">-z</text>

  <line x1="138" y1="182" x2="532" y2="84" stroke="#4B78A8" stroke-width="3"/>
  <line x1="138" y1="182" x2="532" y2="280" stroke="#4B78A8" stroke-width="3"/>
  <line x1="412" y1="114" x2="412" y2="250" stroke="#4B78A8" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text x="428" y="186" fill="#315A82" font-family="Segoe UI, Arial, sans-serif" font-size="20">near plane</text>

  <path d="M196 169 A58 58 0 0 1 196 195" stroke="#C76B50" stroke-width="2.5" stroke-dasharray="7 5"/>
  <text x="212" y="187" fill="#A94E35" font-family="Segoe UI, Arial, sans-serif" font-size="22">fov</text>

  <text x="58" y="286" fill="#5C5550" font-family="Segoe UI, Arial, sans-serif" font-size="19">A larger fov means the frustum opens wider, so the camera can see more.</text>
  <text x="58" y="312" fill="#5C5550" font-family="Segoe UI, Arial, sans-serif" font-size="19">A smaller fov means a narrower view, like zooming in.</text>
</svg>
